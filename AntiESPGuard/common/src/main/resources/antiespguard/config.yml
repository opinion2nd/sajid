# ========================================================================
# AntiESPGuard — Anti-Freecam / Anti-ESP
# Paper / Purpur / Folia / Leaf  (MC 1.21.x — 26.1)
# (Anti-Xray intentionally NOT included in this build.)
# ========================================================================

# Dimensions where masking is active: NORMAL, NETHER, THE_END
enabledEnvironments:
- NORMAL
- NETHER

# Worlds where the plugin is fully inactive (exact folder name).
disabledWorlds: []

# Hide all blocks below this Y from surface players.
hideBelowY: 20

# Masking activates when a player's Y is at or above this value.
revealBelowYWhenUnder: 30

# Max chunks processed per tick for Y-threshold transitions.
maxChunksPerTick: 128

# Progressive chunk reveal when going underground (core freecam resistance).
# Works exactly like vanilla chunk loading: the revealed radius is simply the
# player's own view-distance setting, and it refreshes as they cross into a
# new chunk — no extra config needed.

# Re-mask previously revealed chunks when a player returns to the surface.
remaskOnReturn: true

# Block shown when masking. STONE = solid/indistinguishable (recommended).
maskBlock: STONE
skipMaskIfAlreadyAir: false

# Hide entities below hideBelowY from surface players (anti entity-radar).
maskEntities: true

# Hide underground players (nametags/hitboxes) from surface players (combat ESP).
maskUndergroundPlayers: true

# ---- TAB prefix for hidden players -----------------------------------------
# Hidden players are re-added to TAB with their prefix, resolved in order:
# playerListName (if styled) -> PlaceholderAPI -> LuckPerms API -> Vault -> team.
tabPrefix:
  placeholderFormats:
    - "%luckperms_prefix%%player_name%%luckperms_suffix%"
    - "%vault_prefix%%player_name%%vault_suffix%"
  useVault: true

# ---- Anti Seed Cracker -----------------------------------------------------
# Replace the hashed world seed sent to clients (JOIN_GAME/RESPAWN) with a
# random value, removing the verification oracle used by seed-cracker mods.
antiSeedCracker:
  hideSeed: true

# ---- Brand Detection -------------------------------------------------------
brandDetection:
  notifyAdmins: true

# ---- Mod Detection ---------------------------------------------------------
modDetection:
  probeOnJoin: true
  autoKick: true
  kickMessage: §cYou are using a cheat mod that is not allowed on this server ({mod})!
    Please remove it and rejoin.
  notifyAdmins: true
  discordWebhook: ''
  discordColor: 16711680
  # Enable detection per mod (max 4 active at once).
  detect:
    Freecam: true
    Meteor Client: true
    Wurst: true

# ---- Update Checker --------------------------------------------------------
updateChecker:
  enabled: true
  notifyOps: true
