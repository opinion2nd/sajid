[[mods]]
modId = "antiespguard"
version = "${version}"
displayName = "AntiESPGuard"
authors = "opinion2nd"
description = '''
Hides blocks/entities below a Y level from surface players to defeat Freecam / ESP cheats.
Server-side. Anti-xray intentionally omitted.
'''

[[mixins]]
