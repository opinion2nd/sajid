name: Build AntiESPGuard

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'AntiESPGuard/**'
      - '.github/workflows/antiespguard-build.yml'
  pull_request:
    paths:
      - 'AntiESPGuard/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AntiESPGuard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build common (must pass)
        run: ./gradlew :common:build --no-daemon --stacktrace

      - name: Build Paper jar (must pass)
        run: ./gradlew :paper:shadowJar --no-daemon --stacktrace

      - name: List built artifacts
        run: find . -name '*.jar' -path '*/build/libs/*' -not -name '*-sources.jar'

      - name: Upload jars (Actions artifact)
        uses: actions/upload-artifact@v4
        with:
          name: AntiESPGuard-jars
          path: |
            AntiESPGuard/paper/build/libs/*.jar
          if-no-files-found: error

      # Rolling Release → direct, login-free download links (great on mobile).
      - name: Publish rolling Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: antiespguard-latest
          name: AntiESPGuard (latest build)
          prerelease: true
          files: |
            AntiESPGuard/paper/build/libs/*.jar
          body: |
            Latest AntiESPGuard build from `${{ github.sha }}`.

            - **Paper** (`AntiESPGuard-Paper-*.jar`): drop into `plugins/` **with PacketEvents**.

            Anti-Xray is intentionally not included.
