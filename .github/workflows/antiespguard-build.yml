name: Build AntiESPGuard

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'AntiESPGuard/**'
      - '.github/workflows/antiespguard-build.yml'
  pull_request:
    paths:
      - 'AntiESPGuard/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AntiESPGuard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build common (must pass)
        run: ./gradlew :common:build --no-daemon --stacktrace

      - name: Build Paper jar (must pass)
        run: ./gradlew :paper:shadowJar --no-daemon --stacktrace

      # Fabric / NeoForge pull Minecraft + mappings and use Mixins; allow them to
      # fail without blocking the Paper artifact, so any compile issues surface
      # in the logs while the Paper jar still publishes.
      - name: Build Fabric jar
        id: fabric
        continue-on-error: true
        run: ./gradlew :fabric:build --no-daemon --stacktrace 2>&1 | tee /tmp/fabric.log

      - name: Build NeoForge jar
        id: neoforge
        continue-on-error: true
        run: ./gradlew :neoforge:build --no-daemon --stacktrace 2>&1 | tee /tmp/neoforge.log

      - name: Show Fabric / NeoForge build error tails
        if: always()
        run: |
          echo "==================== FABRIC ===================="
          grep -nE "error:|: error|FAILED|What went wrong|Caused by|cannot find symbol|does not|incompatible types" /tmp/fabric.log | tail -80 || true
          echo "==================== NEOFORGE ===================="
          grep -nE "error:|: error|FAILED|What went wrong|Caused by|cannot find symbol|does not|incompatible types" /tmp/neoforge.log | tail -80 || true

      - name: List built artifacts
        run: find . -name '*.jar' -path '*/build/libs/*' -not -name '*-sources.jar'

      - name: Upload jars (Actions artifact)
        uses: actions/upload-artifact@v4
        with:
          name: AntiESPGuard-jars
          path: |
            AntiESPGuard/paper/build/libs/*.jar
            AntiESPGuard/fabric/build/libs/*.jar
            AntiESPGuard/neoforge/build/libs/*.jar
          if-no-files-found: error

      # Rolling Release → direct, login-free download links (great on mobile).
      - name: Publish rolling Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: antiespguard-latest
          name: AntiESPGuard (latest build)
          prerelease: true
          files: |
            AntiESPGuard/paper/build/libs/*.jar
            AntiESPGuard/fabric/build/libs/*.jar
            AntiESPGuard/neoforge/build/libs/*.jar
          body: |
            Latest AntiESPGuard build from `${{ github.sha }}`.

            - **Paper** (`AntiESPGuard-Paper-*.jar`): drop into `plugins/` **with PacketEvents**.
            - **Fabric** / **NeoForge**: drop into the server's `mods/` folder (server-side).

            Anti-Xray is intentionally not included.
