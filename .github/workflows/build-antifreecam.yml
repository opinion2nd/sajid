name: Build AntiFreeam Plugin

# Run manually from the GitHub website / mobile app (Actions -> Run workflow),
# or automatically when anti-freecam files change on this branch.
on:
  workflow_dispatch:
  push:
    branches:
      - claude/minecraft-anti-freecam-plugin-xp3x19
    paths:
      - 'anti-freecam/**'
      - '.github/workflows/build-antifreecam.yml'

permissions:
  contents: write

jobs:
  build-paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build Paper plugin JAR
        working-directory: anti-freecam
        run: |
          chmod +x gradlew
          ./gradlew :paper:shadowJar --no-daemon --stacktrace
      - name: Upload Paper JAR
        uses: actions/upload-artifact@v4
        with:
          name: jars-paper
          path: anti-freecam/paper/build/libs/*.jar
          if-no-files-found: error

  build-fabric:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build Fabric mod JAR
        working-directory: anti-freecam
        run: |
          chmod +x gradlew
          ./gradlew -p fabric build --no-daemon --stacktrace
      - name: Upload Fabric JAR
        uses: actions/upload-artifact@v4
        with:
          name: jars-fabric
          path: |
            anti-freecam/fabric/build/libs/*.jar
            !anti-freecam/fabric/build/libs/*-sources.jar
          if-no-files-found: error

  build-neoforge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build NeoForge mod JAR
        working-directory: anti-freecam
        run: |
          chmod +x gradlew
          ./gradlew -p neoforge build --no-daemon --stacktrace
      - name: Upload NeoForge JAR
        uses: actions/upload-artifact@v4
        with:
          name: jars-neoforge
          path: |
            anti-freecam/neoforge/build/libs/*.jar
            !anti-freecam/neoforge/build/libs/*-sources.jar
          if-no-files-found: error

  release:
    needs: [build-paper, build-fabric, build-neoforge]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all built JARs
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List downloaded JARs
        run: ls -lhR artifacts || true
      - name: Publish JARs to a downloadable Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: antifreecam-latest
          name: AntiFreeam Plugin (latest build)
          body: |
            Latest AntiFreeam builds. Download the JAR for your server type and
            place it in your server's plugins/ (Paper/Purpur) or mods/ (Fabric/NeoForge) folder.
          files: artifacts/**/*.jar
          fail_on_unmatched_files: false
