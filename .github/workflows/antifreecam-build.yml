name: Build AntiFreecam

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'AntiFreecam/**'
      - '.github/workflows/antifreecam-build.yml'
  pull_request:
    paths:
      - 'AntiFreecam/**'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AntiFreecam
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin jar
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload AntiFreecam jar
        uses: actions/upload-artifact@v4
        with:
          name: AntiFreecam-jar
          path: AntiFreecam/build/libs/*.jar
          if-no-files-found: error
