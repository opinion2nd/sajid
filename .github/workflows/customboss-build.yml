name: Build CustomBoss

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'CustomBoss/**'
      - '.github/workflows/customboss-build.yml'
  pull_request:
    paths:
      - 'CustomBoss/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CustomBoss
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin jar
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload CustomBoss jar (Actions artifact)
        uses: actions/upload-artifact@v4
        with:
          name: CustomBoss-jar
          path: CustomBoss/build/libs/*.jar
          if-no-files-found: error

      # Publish a rolling Release so the jar has a direct, mobile-friendly
      # download link (no login required on a public repo).
      - name: Publish rolling Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: customboss-latest
          name: CustomBoss (latest build)
          prerelease: true
          files: CustomBoss/build/libs/*.jar
          body: |
            Latest CustomBoss build from `${{ github.sha }}`.
            Download the jar below and drop it into your server's `plugins/` folder.
