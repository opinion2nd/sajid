name: Build FreecamGuard

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'FreecamGuard/**'
      - '.github/workflows/freecamguard-build.yml'
  pull_request:
    paths:
      - 'FreecamGuard/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FreecamGuard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin jar
        run: ./gradlew shadowJar --no-daemon --stacktrace

      - name: Upload FreecamGuard jar (Actions artifact)
        uses: actions/upload-artifact@v4
        with:
          name: FreecamGuard-jar
          path: FreecamGuard/build/libs/*.jar
          if-no-files-found: error

      # Publish a rolling Release so the jar has a direct, mobile-friendly
      # download link (no login required on a public repo).
      - name: Publish rolling Release
        if: github.ref == 'refs/heads/claude/freecam-mod-detection-2p4z3y' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: freecamguard-latest
          name: FreecamGuard (latest build)
          prerelease: true
          files: FreecamGuard/build/libs/*.jar
          body: |
            Latest FreecamGuard build from `${{ github.sha }}`.
            Download the jar below and drop it (plus PacketEvents) into your server's `plugins/` folder.
