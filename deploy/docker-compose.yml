services:
  license-server:
    build:
      context: ..
      dockerfile: deploy/license-server.Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/app/data/licenses.db"
      ADMIN_SECRET: ${ADMIN_SECRET}
      PORT: "3000"
      HOST: "0.0.0.0"
    volumes:
      - license-db:/app/data

  license-bot:
    build:
      context: ..
      dockerfile: deploy/license-bot.Dockerfile
    restart: unless-stopped
    depends_on:
      - license-server
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      LICENSE_SERVER_URL: "http://license-server:3000"
      LICENSE_ADMIN_SECRET: ${ADMIN_SECRET}
      LICENSE_BOT_ADMIN_USER_IDS: ${LICENSE_BOT_ADMIN_USER_IDS}
      LICENSE_BOT_ADMIN_ROLE_IDS: ${LICENSE_BOT_ADMIN_ROLE_IDS}

volumes:
  license-db:
