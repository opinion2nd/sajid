# ============================================================================
# AntiFreecam  —  occlusion-based "void below Y" anti-freecam / anti-x-ray
# Paper / Purpur 1.21.x  |  requires the PacketEvents plugin
# ============================================================================
#
# HOW IT WORKS (short version):
#   * Below `hideBelowY`, a solid block is sent to the client as VOID (air) only
#     if it is FULLY BURIED — every one of its 6 neighbours is also solid. Any
#     block that touches a cave / tunnel / dug-out space is sent for real.
#   * So the caves and mines you can actually see stay 100% vanilla, while ore
#     veins buried in solid rock are never sent. A freecam / x-ray camera flying
#     into the rock sees nothing but void.
#   * Mining stays vanilla: when you break a block, the block behind it is
#     revealed instantly (no "void holes").
#
# A server CANNOT detect whether a client has freecam toggled (it is 100%
# client-side), so this plugin does not try to — it simply never sends the data
# freecam would need.
# ----------------------------------------------------------------------------

# Master switch.
enabled: true

# Dimensions where masking is active: NORMAL, NETHER, THE_END
enabledEnvironments:
  - NORMAL
  - NETHER

# Worlds where the plugin is fully inactive (exact world folder name).
disabledWorlds: []

# Occlusion-mask every block strictly below this Y.
hideBelowY: 20

# Block sent in place of a fully-buried block.
#   AIR  -> true void (recommended; this is what you want for anti-freecam).
#   STONE/DEEPSLATE -> solid camouflage. Use ONLY if pure air ever causes
#                      lighting artifacts near caves on your build.
maskBlock: AIR

# ---- Optional: anti entity-ESP (experimental, OFF by default) --------------
# Hides entity-spawn packets for entities below hideBelowY from masked players.
# NOTE: this also hides mobs in caves you are in, so it is NOT fully vanilla.
# Leave false unless you specifically want to fight entity radar.
maskEntities: false

# ---- Mod detection ---------------------------------------------------------
# Reads the client brand string on join. Robust client-side mod detection is
# inherently best-effort; treat hits as a signal, not proof.
modDetection:
  enabled: true
  autoKick: true
  kickMessage: "§cThe Wurst client is not allowed on this server. Remove it and rejoin."
  notifyAdmins: true
  # Case-insensitive substrings checked against the client brand.
  detect:
    Wurst: true
