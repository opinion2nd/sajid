# ============================================================================
# AntiFreecam  —  occlusion-based "void below Y" anti-freecam / anti-x-ray
# Paper / Purpur 1.21.x  |  requires the PacketEvents plugin
# ============================================================================
#
# HOW IT WORKS (short version):
#   * Below `hideBelowY`, a solid block is replaced by `maskBlock` (an opaque
#     solid, e.g. DEEPSLATE) only if it is FULLY BURIED — every one of its 6
#     neighbours is also solid. Any block that touches a cave / tunnel / dug-out
#     space is sent for real.
#   * So the caves and mines you can actually see stay 100% vanilla (you never
#     see the fake block — it is always behind a wall), while ore veins buried in
#     solid rock are hidden. A freecam / x-ray camera flying into the rock hits
#     solid rock and finds no ores or caves.
#   * Mining stays vanilla: when you break a block, the real block behind it is
#     revealed instantly (no holes).
#
# WHY NOT "void"/air? A server CANNOT detect freecam (it is 100% client-side) and
# it sends the SAME blocks to your real camera and a freecam camera. If the buried
# rock were air, EVERYONE (including you) would see through it. Keeping it an
# opaque solid is the only way your own view stays vanilla.
# ----------------------------------------------------------------------------

# Master switch.
enabled: true

# Dimensions where masking is active: NORMAL, NETHER, THE_END
enabledEnvironments:
  - NORMAL
  - NETHER

# Worlds where the plugin is fully inactive (exact world folder name).
disabledWorlds: []

# Occlusion-mask every block strictly below this Y.
hideBelowY: 20

# Block sent in place of a fully-buried block. MUST be an opaque solid.
#   DEEPSLATE -> best camouflage below Y20 (recommended).
#   STONE     -> use if you mask a higher Y band where stone is natural.
#   (AIR is intentionally NOT recommended: it makes the buried rock see-through
#    for everyone, including normal players — see the note at the top.)
maskBlock: DEEPSLATE

# ---- Optional: anti entity-ESP (experimental, OFF by default) --------------
# Hides entity-spawn packets for entities below hideBelowY from masked players.
# NOTE: this also hides mobs in caves you are in, so it is NOT fully vanilla.
# Leave false unless you specifically want to fight entity radar.
maskEntities: false

# ---- Mod detection ---------------------------------------------------------
# Reads the client brand string on join. Robust client-side mod detection is
# inherently best-effort; treat hits as a signal, not proof.
modDetection:
  enabled: true
  autoKick: true
  kickMessage: "§cThe Wurst client is not allowed on this server. Remove it and rejoin."
  notifyAdmins: true
  # Case-insensitive substrings checked against the client brand.
  detect:
    Wurst: true
