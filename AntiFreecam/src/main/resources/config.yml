# ============================================================================
# AntiFreecam  —  original anti-freecam / anti-ESP block masker
# Paper / Purpur 1.21.x  |  requires the PacketEvents plugin
# ============================================================================
#
# HOW IT WORKS (short version):
#   * A "surface" player (Y >= revealBelowYWhenUnder) has every block below
#     `hideBelowY` replaced with `maskBlock` (AIR by default), so a freecam/ESP
#     camera flown down from the surface sees only empty void.
#   * The moment the player's OWN body goes underground, nothing is masked for
#     them — normal underground play is 100% vanilla with no void anywhere.
#   * When they climb back to the surface, the area below is masked again.
#
#   NOTE: freecam is a client-side mod the server cannot detect, and the server
#   sends the same block data for the normal view and the freecam view. So it is
#   impossible to hide blocks ONLY while freecam is active — this plugin instead
#   hides what a surface body should not be able to see.
#
# ----------------------------------------------------------------------------

# Dimensions where masking is active: NORMAL, NETHER, THE_END
enabledEnvironments:
  - NORMAL
  - NETHER

# Worlds where the plugin is fully inactive (exact world folder name).
disabledWorlds: []

# Hide every block strictly below this Y from surface players.
hideBelowY: 20

# Masking is active while a player's Y is at or above this value.
# Drop below it and the area around you is revealed.
revealBelowYWhenUnder: 30

# Minimum reveal radius (in chunks) around an underground player.
# Auto-extends toward the player's view distance. Keep >= 4.
scanRadiusChunks: 4

# Block shown when masking.
#   AIR   = freecam/ESP sees pure empty VOID, all the way down to bedrock
#           (nothing at all — recommended for the strongest "void" look).
#   STONE = a solid wall instead of void.
# You can set any block id here.
maskBlock: AIR

# Only used when maskBlock is a solid block: if a block below hideBelowY is
# already AIR, leave it as AIR. Irrelevant when maskBlock is AIR.
skipMaskIfAlreadyAir: false

# Re-mask the area again when the player returns to the surface.
remaskOnReturn: true

# Hide entities that are below hideBelowY from surface players (anti entity-ESP).
# NOTE: experimental — verify on a test server before production.
maskEntities: true

# ---- Mod detection ---------------------------------------------------------
# Reads the client brand string and registered plugin channels on join.
# Robust client-side mod detection is inherently best-effort; treat hits as a
# signal, not proof. Only Wurst is watched by default (per request).
modDetection:
  enabled: true
  autoKick: true
  kickMessage: "§cThe Wurst client is not allowed on this server. Remove it and rejoin."
  notifyAdmins: true
  # Case-insensitive substrings checked against the client brand / channels.
  detect:
    Wurst: true

# ---- Update checker (disabled for your own build) --------------------------
updateChecker:
  enabled: false
