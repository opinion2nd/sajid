name: AntiFreecam
main: dev.opinion2nd.antifreecam.AntiFreecamPlugin
version: ${version}
api-version: '1.18'
author: opinion2nd
description: Hides blocks below a Y level from surface players to defeat Freecam / ESP cheats. Original implementation.
depend: [packetevents]
folia-supported: false
commands:
  antifreecam:
    description: AntiFreecam admin commands
    usage: /antifreecam <reload|bypass [player]>
    aliases: [af]
    permission: antifreecam.reload
permissions:
  antifreecam.reload:
    description: Allows reloading AntiFreecam configuration
    default: op
  antifreecam.bypass:
    description: Allows toggling the masking bypass for self or other players
    default: op
