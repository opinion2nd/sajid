# Full production stack: web + Postgres + Redis.
# Usage:
#   cp .env.example .env   # fill in real secrets
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://brothercraft:${POSTGRES_PASSWORD:-brothercraft}@postgres:5432/brothercraft?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: brothercraft
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brothercraft}
      POSTGRES_DB: brothercraft
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brothercraft"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
