# ═══════════════════════════════════════════════════════════════════════════════
# UltimateDungeon  |  difficulty.yml
# Five dungeon levels. Each level scales BOTH the challenge (multipliers) and
# the map itself (rooms.min/max) — higher levels generate bigger dungeons.
# ═══════════════════════════════════════════════════════════════════════════════

config-version: 2

difficulties:
  level_1:
    display-name: "Level 1 — Novice"
    health-multiplier: 1.0
    damage-multiplier: 1.0
    cooldown-multiplier: 1.0
    spawn-rate-multiplier: 1.0
    loot-tier-bonus: 0
    trap-damage-multiplier: 1.0
    rooms:
      min: 10
      max: 12

  level_2:
    display-name: "Level 2 — Adept"
    health-multiplier: 1.35
    damage-multiplier: 1.25
    cooldown-multiplier: 0.9
    spawn-rate-multiplier: 1.25
    loot-tier-bonus: 1
    trap-damage-multiplier: 1.3
    rooms:
      min: 14
      max: 17

  level_3:
    display-name: "Level 3 — Veteran"
    health-multiplier: 1.75
    damage-multiplier: 1.55
    cooldown-multiplier: 0.8
    spawn-rate-multiplier: 1.5
    loot-tier-bonus: 2
    trap-damage-multiplier: 1.6
