# ═══════════════════════════════════════════════════════════════════════════════
# UltimateDungeon  |  difficulty.yml
# Five dungeon levels. Each level scales the challenge (multipliers), the map
# size (rooms.min/max) AND the boss fight: boss-count bosses spawn together in
# the arena — Level 1 has 1 boss, Level 5 has 5.
# ═══════════════════════════════════════════════════════════════════════════════

config-version: 2

