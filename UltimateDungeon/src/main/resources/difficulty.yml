      min: 19
      max: 23

  level_4:
    display-name: "Level 4 — Champion"
    health-multiplier: 2.25
    damage-multiplier: 1.9
    cooldown-multiplier: 0.7
    spawn-rate-multiplier: 1.8
    loot-tier-bonus: 3
    trap-damage-multiplier: 2.0
    rooms:
      min: 25
      max: 30

  level_5:
    display-name: "Level 5 — Legend"
    health-multiplier: 3.0
    damage-multiplier: 2.4
    cooldown-multiplier: 0.6
    spawn-rate-multiplier: 2.2
    loot-tier-bonus: 4
    trap-damage-multiplier: 2.5
    rooms:
      min: 32
      max: 40
