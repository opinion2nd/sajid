# ═══════════════════════════════════════════════════════════════════════════════
# UltimateDungeon  |  party.yml
# Party size, invite timeouts, leader transfer, and cooperative rules.
# ═══════════════════════════════════════════════════════════════════════════════

config-version: 1

max-party-size: 6
invite-timeout: 60
ready-check-duration: 30
reconnect-timeout: 120

# auto   — leadership transfers to the next senior member on leader departure.
# manual — leader must manually transfer before leaving.
# disband — party disbands if the leader leaves without transferring.
leader-transfer-mode: auto

friendly-fire: false
late-join: false

# Party revive: a dead member becomes a spectator at their body (soul beacon).
# A living teammate who SNEAKS within 2.5 blocks for hold-seconds revives them
# with half health. If nobody arrives within timeout-seconds they leave the run.
revive:
  enabled: true
  hold-seconds: 5
  timeout-seconds: 60
