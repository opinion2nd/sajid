# ═══════════════════════════════════════════════════════════════════════════════
# UltimateDungeon  |  bosses.yml
# Eight unique bosses — each with its own entity, arena, BossBar, three phases,
# five abilities, drop table, rewards and dialogue.
#
# Ability slots are applied in order:
#   1 = Area-Denial   2 = Projectile   3 = Summon   4 = Mobility   5 = Environment
# Damage/cooldown/range here are BASE values; difficulty multipliers scale them.
# ═══════════════════════════════════════════════════════════════════════════════

config-version: 1

bosses:

  # ── Ancient Ruins ──────────────────────────────────────────────────────────
  boss_1:
    display-name: "<red><bold>Korthel, the Forgotten King</bold></red>"
    entity-type: ZOMBIE
    health: 600
    arena-lock-block: OBSIDIAN
    countdown-seconds: 10
    bossbar: { color: RED, style: SEGMENTED_20 }
    phases:
      - { threshold: 1.0, phase-id: phase_one }
      - { threshold: 0.5, phase-id: phase_two }
      - { threshold: 0.25, phase-id: phase_three }
    abilities:
      tomb_quake:   { damage: 9.0,  cooldown-ticks: 120, range: 6 }
      cursed_bolt:  { damage: 11.0, cooldown-ticks: 80,  range: 14 }
      raise_husks:  { damage: 0.0,  cooldown-ticks: 240, range: 6 }
      royal_charge: { damage: 13.0, cooldown-ticks: 160, range: 12 }
      decay_aura:   { damage: 4.0,  cooldown-ticks: 200, range: 8 }
    rewards: { money: 500, experience: 1000, loot-table: boss_1_loot }
    dialogue:
      enabled: true
      spawn: "<red>Korthel:</red> <gray>You trespass upon a throne older than memory."
      phase-two: "<red>Korthel:</red> <gray>The crown does not yield so easily!"
      death: "<gray>Korthel crumbles to dust... the throne is yours."

  boss_2:
    display-name: "<dark_purple><bold>Vaelora, Keeper of Ruin</bold></dark_purple>"
    entity-type: EVOKER
    health: 520
    arena-lock-block: OBSIDIAN
    countdown-seconds: 10
    bossbar: { color: PURPLE, style: SEGMENTED_12 }
    phases:
      - { threshold: 1.0, phase-id: phase_one }
      - { threshold: 0.5, phase-id: phase_two }
      - { threshold: 0.25, phase-id: phase_three }
    abilities:
      collapsing_floor: { damage: 8.0,  cooldown-ticks: 130, range: 6 }
      ruin_shard:       { damage: 10.0, cooldown-ticks: 70,  range: 16 }
      summon_sentinels: { damage: 0.0,  cooldown-ticks: 260, range: 6 }
      phase_step:       { damage: 9.0,  cooldown-ticks: 140, range: 10 }
      dust_veil:        { damage: 3.0,  cooldown-ticks: 180, range: 7 }
    rewards: { money: 450, experience: 900, loot-table: boss_2_loot }
    dialogue:
      enabled: true
      spawn: "<dark_purple>Vaelora:</dark_purple> <gray>What was lost shall stay lost."
      phase-two: "<dark_purple>Vaelora:</dark_purple> <gray>The ruins answer to me!"
      death: "<gray>Vaelora fades back into the rubble."

  # ── Frozen Cavern ──────────────────────────────────────────────────────────
  boss_3:
    display-name: "<blue><bold>Frostmaw, the Glacial Tyrant</bold></blue>"
    entity-type: STRAY
    health: 700
    arena-lock-block: BLUE_ICE
    countdown-seconds: 12
    bossbar: { color: BLUE, style: SEGMENTED_20 }
    phases:
      - { threshold: 1.0, phase-id: phase_one }
      - { threshold: 0.5, phase-id: phase_two }
      - { threshold: 0.25, phase-id: phase_three }
    abilities:
      glacial_slam:   { damage: 10.0, cooldown-ticks: 120, range: 7 }
      ice_lance:      { damage: 12.0, cooldown-ticks: 75,  range: 16 }
      summon_brutes:  { damage: 0.0,  cooldown-ticks: 280, range: 6 }
      avalanche_dash: { damage: 14.0, cooldown-ticks: 150, range: 12 }
      blizzard:       { damage: 5.0,  cooldown-ticks: 200, range: 9 }
    rewards: { money: 650, experience: 1300, loot-table: boss_3_loot }
    dialogue:
      enabled: true
      spawn: "<blue>Frostmaw:</blue> <gray>Warm blood... how rare down here."
      phase-two: "<blue>Frostmaw:</blue> <gray>Freeze!"
      death: "<gray>Frostmaw shatters into a thousand shards."

  # ── Corrupted Temple ───────────────────────────────────────────────────────
  boss_4:
    display-name: "<light_purple><bold>Nethys, the Void Prophet</bold></light_purple>"
