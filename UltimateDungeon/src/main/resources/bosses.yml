    dialogue:
      enabled: true
      spawn: "<dark_purple>Malgrith:</dark_purple> <gray>I will defile even your bones."
      phase-two: "<dark_purple>Malgrith:</dark_purple> <gray>Rot. ROT!"
      death: "<gray>Malgrith dissolves into corruption."

  # ── Volcanic Fortress ──────────────────────────────────────────────────────
  boss_6:
    display-name: "<red><bold>Ignarok, the Molten Warlord</bold></red>"
    entity-type: PIGLIN_BRUTE
