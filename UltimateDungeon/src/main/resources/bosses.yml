    dialogue:
      enabled: true
      spawn: "<light_purple>Nethys:</light_purple> <gray>The void sees all. It sees you."
      phase-two: "<light_purple>Nethys:</light_purple> <gray>Gaze into oblivion!"
      death: "<gray>Nethys collapses inward and is gone."

  boss_5:
