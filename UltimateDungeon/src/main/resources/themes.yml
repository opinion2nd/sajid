# ═══════════════════════════════════════════════════════════════════════════════
# UltimateDungeon  |  themes.yml
# Theme definitions — block palettes, ambience, monster pools, boss selection
# and the layout archetype each map uses. Every theme generates a visibly
# different dungeon shape:
#   ancient_ruins       -> HUB_AND_SPOKE    (central plaza, four ruined wings)
#   frozen_cavern       -> WINDING_PATH     (serpentine ice tunnel, side grottos)
#   corrupted_temple    -> SYMMETRIC_AXIS   (processional nave, mirrored chapels)
#   volcanic_fortress   -> CONCENTRIC_RINGS (fight inward to the central keep)
#   forgotten_catacombs -> GRID_MAZE        (branching burial maze, dead ends)
# ═══════════════════════════════════════════════════════════════════════════════

config-version: 2

themes:
  ancient_ruins:
    display-name: "Ancient Ruins"
    layout-style: HUB_AND_SPOKE
    blocks:
      primary: COBBLESTONE
      secondary: MOSSY_COBBLESTONE
      accent: MOSSY_STONE_BRICKS
      floor: STONE_BRICKS
      ceiling: CRACKED_STONE_BRICKS
    ambient-sound: BLOCK_CAVE_DRIP_WATER
    particles:
      - FALLING_DUST
      - SMOKE
    monster-pool:
      - common_monster_1
      - common_monster_2
      - elite_monster_1
    boss-pool:
      - tharok
      - sylvara

  frozen_cavern:
    display-name: "Frozen Cavern"
    layout-style: WINDING_PATH
    blocks:
      primary: PACKED_ICE
      secondary: BLUE_ICE
      accent: SNOW_BLOCK
      floor: PACKED_ICE
      ceiling: PACKED_ICE
    ambient-sound: BLOCK_POWDER_SNOW_STEP
    particles:
      - SNOWFLAKE
      - CLOUD
    monster-pool:
      - common_monster_3
      - elite_monster_2
    boss-pool:
      - boreas
      - aethon

  corrupted_temple:
    display-name: "Corrupted Temple"
    layout-style: SYMMETRIC_AXIS
    blocks:
      primary: PURPUR_BLOCK
      secondary: BLACKSTONE
      accent: CRYING_OBSIDIAN
      floor: PURPUR_BLOCK
      ceiling: BLACKSTONE
    ambient-sound: BLOCK_SOUL_SAND_PLACE
    particles:
      - SOUL_FIRE_FLAME
      - PORTAL
    monster-pool:
      - common_monster_4
      - elite_monster_3
    boss-pool:
      - zharok

  volcanic_fortress:
    display-name: "Volcanic Fortress"
    layout-style: CONCENTRIC_RINGS
    blocks:
      primary: NETHER_BRICKS
      secondary: MAGMA_BLOCK
      accent: BLACKSTONE
      floor: NETHER_BRICKS
      ceiling: BASALT
    ambient-sound: BLOCK_LAVA_AMBIENT
    particles:
      - FLAME
      - LAVA
    monster-pool:
      - common_monster_5
      - elite_monster_1
    boss-pool:
      - vulkhan

  forgotten_catacombs:
    display-name: "Forgotten Catacombs"
    layout-style: GRID_MAZE
    blocks:
      primary: DEEPSLATE_BRICKS
      secondary: BONE_BLOCK
      accent: CRACKED_DEEPSLATE_BRICKS
      floor: DEEPSLATE_TILES
      ceiling: DEEPSLATE
    ambient-sound: BLOCK_ROOTED_DIRT_PLACE
    particles:
      - LARGE_SMOKE
      - WITCH
    monster-pool:
      - common_monster_1
      - rare_monster_1
    boss-pool:
      - nyxara
