name: AntiFreeam
version: '${version}'
main: dev.thewindows.antifreecam.paper.AntiFreeamPlugin
api-version: "1.21"
author: TheWindows
description: Prevents freecam usage on the server. Voids view below Y=10 for detected freecam users.
website: https://github.com/thewindows/anti-freecam

depend:
  - ProtocolLib

commands:
  antifreecam:
    description: AntiFreeam management command
    usage: /antifreecam <status|reload|check|whitelist|unwhitelist>
    aliases: [afc]
    permission: antifreecam.admin

permissions:
  antifreecam.admin:
    description: Manage the AntiFreeam plugin
    default: op
  antifreecam.bypass:
    description: Bypass freecam detection (for trusted staff)
    default: false
